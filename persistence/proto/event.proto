syntax = "proto3";

package event;

option go_package = "github.com/VitoNaychev/egt-challenge/persistence/gen;eventpb";

import "google/protobuf/timestamp.proto";

service EventService {
  rpc Get (GetRequest) returns (GetResponse);
  rpc List (ListRequest) returns (ListResponse);
}

message Event {
  string id = 1;
  string session_id = 2;
  string type = 3;
  string message = 4;
  google.protobuf.Timestamp timestamp = 5;
}

message GetRequest {
  string id = 1;
}

message GetResponse {
  Event event = 1;
}

message ListRequest{}

message ListResponse {
    repeated Event events = 1;
}
