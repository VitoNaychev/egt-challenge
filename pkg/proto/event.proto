syntax = "proto3";

package event;

option go_package = "github.com/VitoNaychev/egt-challenge/pkg/gen;eventpb";

import "google/protobuf/timestamp.proto";

message Event {
  string id = 1;
  string session_id = 2;
  string type = 3;
  string message = 4;
  google.protobuf.Timestamp timestamp = 5;
}
